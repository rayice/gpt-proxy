<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT Proxy — Usage</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0d1117; color: #c9d1d9; padding: 24px; }
  h1 { color: #58a6ff; margin-bottom: 8px; font-size: 22px; }
  .subtitle { color: #8b949e; margin-bottom: 24px; font-size: 13px; }
  .section { margin-bottom: 32px; }
  .section h2 { color: #f0f6fc; font-size: 16px; margin-bottom: 4px; }
  .section .meta { color: #8b949e; font-size: 12px; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: #8b949e; font-weight: 600; padding: 8px 12px; border-bottom: 1px solid #21262d; }
  td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
  tr:hover td { background: #161b22; }
  tr.totals td { font-weight: 700; color: #f0f6fc; border-top: 2px solid #30363d; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .bar-cell { width: 120px; }
  .bar { height: 14px; background: #1f6feb; border-radius: 3px; min-width: 2px; }
  .bar.cached { background: #2ea043; }
  .bar.reasoning { background: #a371f7; }
  .legend { display: flex; gap: 16px; margin-bottom: 16px; font-size: 12px; color: #8b949e; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .legend .dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  .dot.input { background: #1f6feb; }
  .dot.output { background: #58a6ff; }
  .dot.cached { background: #2ea043; }
  .dot.reasoning { background: #a371f7; }
  .refresh { color: #8b949e; font-size: 11px; margin-top: 16px; }
  .error { color: #f85149; padding: 16px; background: #1c1014; border-radius: 6px; }
</style>
</head>
<body>
<h1>GPT Proxy Usage</h1>
<div class="subtitle">Token usage tracking &mdash; auto-refreshes every 30s</div>

<div class="legend">
  <span><span class="dot input"></span> Input</span>
  <span><span class="dot output"></span> Output</span>
  <span><span class="dot reasoning"></span> Reasoning</span>
</div>

<div id="content"><p style="color:#8b949e">Loading...</p></div>
<div class="refresh" id="refresh-info"></div>

<script>
const endpoint = new URLSearchParams(window.location.search).get('endpoint') || '/v1/usage';

function fmt(n) {
  if (n === 0) return '0';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toLocaleString();
}

function renderTable(snapshot, maxTokens) {
  const models = Object.entries(snapshot.models).sort((a, b) => b[1].input_tokens - a[1].input_tokens);
  if (models.length === 0 && snapshot.totals.requests === 0) {
    return '<p style="color:#8b949e;padding:8px 0">No requests yet</p>';
  }

  let html = `<table>
    <tr>
      <th>Model</th>
      <th class="num">Requests</th>
      <th class="num">Input</th>
      <th class="num">Output</th>
      <th class="num">Reasoning</th>
      <th class="bar-cell">Distribution</th>
    </tr>`;

  for (const [model, u] of models) {
    const total = u.input_tokens + u.output_tokens;
    const barW = maxTokens > 0 ? Math.max(2, Math.round((total / maxTokens) * 100)) : 2;
    html += `<tr>
      <td>${model}</td>
      <td class="num">${fmt(u.requests)}</td>
      <td class="num">${fmt(u.input_tokens)}</td>
      <td class="num">${fmt(u.output_tokens)}</td>
      <td class="num">${fmt(u.reasoning_tokens)}</td>
      <td class="bar-cell"><div class="bar" style="width:${barW}%"></div></td>
    </tr>`;
  }

  const t = snapshot.totals;
  html += `<tr class="totals">
    <td>Total</td>
    <td class="num">${fmt(t.requests)}</td>
    <td class="num">${fmt(t.input_tokens)}</td>
    <td class="num">${fmt(t.output_tokens)}</td>
    <td class="num">${fmt(t.reasoning_tokens)}</td>
    <td></td>
  </tr>`;

  html += '</table>';
  return html;
}

async function refresh() {
  try {
    const res = await fetch(endpoint);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const allMax = Math.max(
      data.session.totals.input_tokens + data.session.totals.output_tokens,
      data.today.totals.input_tokens + data.today.totals.output_tokens,
      1
    );

    let html = '';

    html += `<div class="section">
      <h2>Session</h2>
      <div class="meta">Started: ${new Date(data.session.started).toLocaleString()}</div>
      ${renderTable(data.session, allMax)}
    </div>`;

    html += `<div class="section">
      <h2>Today</h2>
      <div class="meta">${data.today.date}</div>
      ${renderTable(data.today, allMax)}
    </div>`;

    document.getElementById('content').innerHTML = html;
    document.getElementById('refresh-info').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="error">Failed to load usage: ${e.message}</div>`;
  }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
